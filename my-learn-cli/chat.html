<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my-learn-cli</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
.header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; color: #333; }
.header button { padding: 6px 16px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
.header button:hover { background: #f0f0f0; }
.chat-container { flex: 1; overflow-y: auto; padding: 20px 24px; }
.message { margin-bottom: 16px; display: flex; }
.message.user { justify-content: flex-end; }
.message .bubble { max-width: 70%; padding: 10px 16px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; font-size: 14px; }
.message.user .bubble { background: #1890ff; color: #fff; border-bottom-right-radius: 4px; }
.message.bot .bubble { background: #fff; color: #333; border: 1px solid #e8e8e8; border-bottom-left-radius: 4px; }
.input-area { background: #fff; padding: 16px 24px; border-top: 1px solid #e0e0e0; display: flex; gap: 12px; }
.input-area input { flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #1890ff; }
.input-area button { padding: 10px 24px; background: #1890ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
.input-area button:hover { background: #40a9ff; }
.input-area button:disabled { background: #ccc; cursor: not-allowed; }
.typing { color: #999; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 my-learn-cli</h1>
  <div>
    <button onclick="clearHistory()">清除记忆</button>
    <button onclick="newSession()">新对话</button>
  </div>
</div>

<div class="chat-container" id="chatContainer"></div>

<div class="input-area">
  <input type="text" id="messageInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
  <button id="sendBtn" onclick="sendMessage()">发送</button>
</div>

<script>
let sessionId = crypto.randomUUID().slice(0, 8);
const container = document.getElementById('chatContainer');
const input = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  sendBtn.disabled = true;
  addMessage(text, 'user');

  // 添加 "思考中..." 提示
  const botDiv = document.createElement('div');
  botDiv.className = 'message bot';
  botDiv.innerHTML = '<div class="bubble typing">思考中...</div>';
  container.appendChild(botDiv);
  container.scrollTop = container.scrollHeight;

  try {
    // POST /message（对应 CowAgent 的 POST /message）
    const res = await fetch('/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });
    const data = await res.json();

    if (data.status !== 'success') {
      botDiv.querySelector('.bubble').textContent = '发送失败';
      sendBtn.disabled = false;
      return;
    }

    sessionId = data.session_id;

    // SSE 流式接收（对应 CowAgent 的 EventSource → /stream）
    const evtSource = new EventSource(`/stream?request_id=${data.request_id}`);
    let fullText = '';
    const bubble = botDiv.querySelector('.bubble');
    bubble.classList.remove('typing');
    bubble.textContent = '';

    evtSource.onmessage = (e) => {
      const event = JSON.parse(e.data);
      if (event.type === 'token') {
        fullText += event.data;
        bubble.textContent = fullText;
        container.scrollTop = container.scrollHeight;
      } else if (event.type === 'done') {
        evtSource.close();
        sendBtn.disabled = false;
        if (!fullText) bubble.textContent = '(无回复)';
      } else if (event.type === 'error') {
        evtSource.close();
        bubble.textContent = `错误: ${event.data}`;
        sendBtn.disabled = false;
      }
    };

    evtSource.onerror = () => {
      evtSource.close();
      if (!fullText) bubble.textContent = '连接中断';
      sendBtn.disabled = false;
    };

  } catch (err) {
    botDiv.querySelector('.bubble').textContent = `发送失败: ${err.message}`;
    sendBtn.disabled = false;
  }
}

async function clearHistory() {
  await fetch(`/api/sessions/${sessionId}/clear`, { method: 'POST' });
  container.innerHTML = '';
  addMessage('记忆已清除', 'bot');
}

function newSession() {
  sessionId = crypto.randomUUID().slice(0, 8);
  container.innerHTML = '';
  addMessage('新对话已创建', 'bot');
}

// 页面加载完成后聚焦输入框
input.focus();
</script>
</body>
</html>
